name: node ci/cd for dockerfile

on:
    push:
        branches:
            - main
    
    pull_request:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: 4OM60_INT332/demo
        
        steps:
            - name: checkout repo
              uses: actions/checkout@v4

            - name: Login docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build the image
              run: |
                docker build -t ${{ secrets.DOCKER_USERNAME }}/demo-app:latest \
                -t ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }} \
                .

            - name: Push latest image
              run: docker push  ${{ secrets.DOCKER_USERNAME }}/demo-app:latest

            - name: Push versioned image
              run: docker push ${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}
